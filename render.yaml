services:
  # The FactVerifier Streamlit App
  - type: web
    name: fact-verifier-app
    runtime: docker
    plan: free
    port: 10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENDEE_API_URL
        value: http://localhost:8080/api/v1
